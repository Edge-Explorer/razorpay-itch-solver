# SUMMARY OF K8S STRATEGY:
# 1. Deployment: One for 'api', one for 'worker'.
# 2. Service: A LoadBalancer to distribute traffic.
# 3. HPA: Scale Workers from 2 to 20 based on CPU load.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: supplier-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supplier-worker
  template:
    metadata:
      labels:
        app: supplier-worker
    spec:
      containers:
      - name: worker
        image: your-registry/supplier-verification:latest
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"