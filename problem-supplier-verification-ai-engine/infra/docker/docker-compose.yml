version: '3.8'

services:
  # THE API GATEWAY
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: ../../.env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  # THE MUSCLE (SCALABLE WORKER)
  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    command: celery -A src.workers.celery_app.worker_app worker --loglevel=info --concurrency=4
    env_file: ../../.env
    depends_on:
      - redis

  # THE MESSAGE BUS
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"